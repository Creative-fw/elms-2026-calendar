name: Sync ELMS 2026 calendar
on:
  schedule:
    - cron: "15 3 * * *"   # daily 03:15 UTC (07:15 Dubai)
  workflow_dispatch:        # manual run button
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Fetch and repair ELMS feed
        run: python elms_sync.py ELMS_2026.ics
      - name: Commit if changed
        run: |
          git config user.name "elms-sync-bot"
          git config user.email "actions@github.com"
          git add ELMS_2026.ics
          git diff --staged --quiet || git commit -m "Sync ELMS calendar $(date -u +%F)"
          git push
